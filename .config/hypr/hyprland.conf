# Hyprland config - forked from the sway config
# Surface Laptop 4 with linux-surface kernel
# Kept as close to .config/sway/config as Hyprland allows.

#############
# Variables #
#############

$mod   = ALT
$up    = L
$down  = K
$left  = J
$right = semicolon

###########
# Monitors #
###########
# sway: output * scale 1.75 / DP-2 2560x1440@120 scale 1.25 pos 0 0 / eDP-1 pos 2048 0
monitor = DP-2, 2560x1440@119.998, 0x0, 1.25
# Hyprland quantizes scale to 1/120 steps and requires integer logical
# pixels, so sway's 1.75 is unachievable on this 2256x1504 panel. The only
# valid scales near it are 1.6 (1410x940) and 1.958 (1152x768); 1.6 is the
# closest to 1.75 and is what Hyprland auto-selects anyway.
monitor = eDP-1, preferred, 2048x0, 1.6
monitor = , preferred, auto, 1

###############
# Look & feel #
###############

general {
    gaps_in  = 2          # sway "gaps inner 4" ≈ 2px per side = 4px between windows
    gaps_out = 0          # sway "gaps outer 0"
    border_size = 2       # sway "default_border normal 2"
    layout = dwindle

    # Day palette (sway client.focused border / inactive child_border)
    col.active_border   = rgb(000000)
    col.inactive_border = rgb(deddd1)
}

decoration {
    rounding = 6          # slightly rounded corners (try-out; sway was square)
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows,    1, 2, ease, popin 80%
    animation = windowsOut, 1, 2, ease, popin 80%
    animation = border,     1, 3, ease
    animation = fade,       1, 2, ease
    animation = workspaces, 1, 1, ease, fade
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(f2f1e5)   # solid bg, native (sway "output * bg")
}

#########
# Input #
#########
# sway: focus_follows_mouse no ; touchpad tap/dwt on, natural_scroll off

input {
    follow_mouse = 0
    touchpad {
        tap-to-click = true
        natural_scroll = false
        disable_while_typing = true
    }
}

# sway "floating_modifier Mod1" — drag floating windows with the mod held
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

#############
# Key binds #
#############

# Theme
bind = $mod, F5, exec, ~/.config/hypr/theme-night.sh
bind = $mod, F6, exec, ~/.config/hypr/theme-day.sh

# Terminal
bind = $mod, Return, exec, foot

# Browser / apps
bind = $mod, C, exec, firefox
bind = $mod, O, exec, obsidian

# Kill focused window
bind = $mod SHIFT, Q, killactive

# App launcher
bind = $mod, D, exec, wmenu-run

# Focus
bind = $mod, $left,  movefocus, l
bind = $mod, $down,  movefocus, d
bind = $mod, $up,    movefocus, u
bind = $mod, $right, movefocus, r

bind = $mod, Left,  movefocus, l
bind = $mod, Down,  movefocus, d
bind = $mod, Up,    movefocus, u
bind = $mod, Right, movefocus, r

# Move
bind = $mod SHIFT, $left,  movewindow, l
bind = $mod SHIFT, $down,  movewindow, d
bind = $mod SHIFT, $up,    movewindow, u
bind = $mod SHIFT, $right, movewindow, r

bind = $mod SHIFT, Left,  movewindow, l
bind = $mod SHIFT, Down,  movewindow, d
bind = $mod SHIFT, Up,    movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Split / layout (Hyprland dwindle auto-splits by window dimensions)
bind = $mod, H, layoutmsg, togglesplit   # sway "split h"  → flip split orientation
bind = $mod, V, layoutmsg, togglesplit   # sway "split v"  → flip split orientation
bind = $mod, E, layoutmsg, togglesplit   # sway "layout toggle split"
bind = $mod, W, togglegroup            # sway "layout tabbed" ≈ window group
bind = $mod, S, togglegroup            # sway "layout stacking" (closest analog)
bind = $mod, Tab, changegroupactive, f # cycle within a group

# Fullscreen
bind = $mod, F, fullscreen, 0

# Floating
bind = $mod SHIFT, space, togglefloating
# (sway "focus mode_toggle" — toggle focus tiled/floating — has no direct Hyprland dispatcher)

# Focus parent — no direct dwindle equivalent in Hyprland (sway "focus parent")

# Scratchpad → Hyprland special workspace
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Session management
bind = $mod SHIFT, C, exec, hyprctl reload   # sway reload
bind = $mod SHIFT, R, exec, hyprctl reload   # sway "swaymsg reload"
bind = $mod SHIFT, E, exit                   # sway exit (no nag confirmation)

# Lock
bind = CTRL $mod, L, exec, swaylock

# Media keys
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Resize submode (sway mode "resize", $mod+r)
bind = $mod, R, submap, resize
submap = resize
binde = , $left,     resizeactive, -10 0   # shrink width
binde = , $down,     resizeactive, 0 10    # grow height
binde = , $up,       resizeactive, 0 -10   # shrink height
binde = , $right,    resizeactive, 10 0    # grow width
binde = , Left,      resizeactive, -10 0
binde = , Down,      resizeactive, 0 10
binde = , Up,        resizeactive, 0 -10
binde = , Right,     resizeactive, 10 0
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
submap = reset

# Lid close → lock then suspend (sway "bindswitch lid:on")
# Device name may differ; check with: hyprctl devices | grep -i switch
bindl = , switch:on:Lid Switch, exec, swaylock -f & systemctl suspend

#############
# Autostart #
#############
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar -c ~/.config/waybar/config-hypr.jsonc
exec-once = swayidle -w \
    timeout 300 'swaylock -f' \
    timeout 600 'hyprctl dispatch dpms off' \
    resume      'hyprctl dispatch dpms on' \
    before-sleep 'swaylock -f'
